<!DOCTYPE html>
<html>
<head>
  <title>TNet Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🔥 TNet Control Panel</h1>

  <!-- API KEY INPUT -->
  <div class="card">
    <h3>Enter API Key</h3>
    <input id="apiKeyInput" placeholder="tnet_xxx">
    <button onclick="saveKey()">Save</button>
  </div>

  <!-- USAGE -->
  <div class="card">
    <h3>Usage</h3>
    <p id="usage">0 requests</p>
  </div>

  <!-- TEST IMAGE -->
  <div class="card">
    <h3>Test Image API</h3>
    <input id="imageUrl" placeholder="Image URL">
    <button onclick="analyzeImage()">Analyze</button>

    <pre id="result"></pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
